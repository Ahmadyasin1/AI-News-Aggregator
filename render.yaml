databases:
  - name: ai-news-aggregator-db
    databaseName: ai_news_aggregator
    user: ai_news_user
    plan: free

services:
  # ─── Main Web Service (FastAPI + Embedded 8AM Scheduler) ───────────────────
  - type: web
    name: ai-news-aggregator-api
    env: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m uvicorn app.api:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-news-aggregator-db
          property: connectionString
      - key: ENVIRONMENT
        value: PRODUCTION
      - key: HF_TOKEN
        sync: false
      - key: HF_MODEL
        value: meta-llama/Llama-3.2-3B-Instruct
      - key: LLM_PROVIDER
        value: huggingface
      - key: MY_EMAIL
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: APP_AUTHOR
        value: Ahmad Yasin
      - key: WEBSHARE_USERNAME
        sync: false
      - key: WEBSHARE_PASSWORD
        sync: false
      - key: SCHEDULER_TIMEZONE
        value: Asia/Karachi

  # ─── Frontend Web Service (React Static Site) ──────────────────────────────
  - type: web
    name: ai-news-aggregator-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: ai-news-aggregator-api
          envVarKey: RENDER_EXTERNAL_URL
        # We append /api to the backend URL automatically in Render
        # Wait, fromService pulls the exact URL. We can just append /api in the React app if it's missing, but VITE_API_BASE_URL expects the full /api path.
        # It's better to just leave it and set it manually if needed, or we can use the backend's URL.
        # Actually Render doesn't support appending strings natively in fromService. 
        # I'll just change fromService to generic sync: false so the user can paste the backend URL + /api
      - key: VITE_API_BASE_URL
        sync: false
